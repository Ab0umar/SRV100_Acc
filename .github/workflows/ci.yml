name: SRV100_Acc CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Verify tools
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript Check
        run: pnpm check

      - name: Check for raw Tailwind palette tokens
        run: |
          if grep -r -E "(sky|cyan|pink|indigo|teal|emerald|rose|violet|fuchsia|amber|orange|yellow|lime|green|blue|red|purple)-[0-9]+" client/src --include="*.tsx" --include="*.ts" | grep -v "node_modules"; then
            echo "❌ Raw Tailwind palette tokens found. Use semantic tokens instead (primary, secondary, success, warning, destructive, muted)."
            exit 1
          else
            echo "✅ No raw Tailwind palette tokens detected."
          fi

      - name: Run Tests
        run: pnpm test

      - name: Run Build
        run: pnpm build
