<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#003D82" />
    <meta name="color-scheme" content="light" />
    <meta
      name="description"
      content="مركز عيون الشروق — البوابة الطبية." />
    <link rel="dns-prefetch" href="//op.selrs.cc" />
    <link rel="preconnect" href="https://op.selrs.cc" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/brand-fallback.svg" />
    <link rel="apple-touch-icon" href="/brand-fallback.svg" />
    <title>عيون الشروق</title>
    <!-- THIS IS THE START OF A COMMENT BLOCK, BLOCK TO BE DELETED: Google Fonts here, example:

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 61, 130, 0.18), transparent 42%),
          linear-gradient(135deg, #ffffff 0%, #e8f0f8 100%);
        color: #001f47;
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #boot-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .boot-splash-card {
        width: min(88vw, 420px);
        border: 1px solid rgba(0, 61, 130, 0.14);
        border-radius: 28px;
        padding: 28px 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 60px rgba(0, 31, 71, 0.14);
        text-align: center;
        backdrop-filter: blur(12px);
      }

      .boot-splash-logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
        filter: drop-shadow(0 8px 20px rgba(0, 61, 130, 0.22));
      }

      .boot-splash-line {
        width: 84px;
        height: 4px;
        margin: 18px auto 0;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(0, 61, 130, 0.2), #003d82 38%, #ff9500 72%, rgba(255, 149, 0, 0.2));
        animation: bootPulse 1.4s ease-in-out infinite;
      }

      @keyframes bootPulse {
        0%, 100% { transform: scaleX(0.75); opacity: 0.55; }
        50% { transform: scaleX(1); opacity: 1; }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash-card">
        <img
          class="boot-splash-logo"
          src="/center-logo.png"
          alt="شعار مركز عيون الشروق"
          onerror="this.onerror=null;this.src='/brand-fallback.svg'"
        />
        <div style="margin-top: 18px; font-size: 1.35rem; font-weight: 700;">عيون الشروق</div>
        <div style="margin-top: 8px; color: #475569; font-size: 0.95rem;">
          جاري التحميل…
        </div>
        <div class="boot-splash-line"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
