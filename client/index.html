    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 61, 130, 0.18), transparent 42%),
          linear-gradient(135deg, #ffffff 0%, #e8f0f8 100%);
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #boot-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .boot-splash-stage {
        position: relative;
        width: 200px;
        height: 200px;
        display: grid;
        place-items: center;
      }

      .boot-splash-logo {
        position: absolute;
        width: 160px;
        height: 160px;
        background-image: url("/logos/full.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
        display: block;
        will-change: transform, filter, opacity, clip-path;
        z-index: 2;
        animation: boot-a4-wipe 2.6s ease-in-out infinite;
      }

      @keyframes boot-a4-wipe {
        0%   { clip-path: ellipse(70% 4% at 50% 50%); filter: blur(0); }
        25%  { clip-path: ellipse(72% 36% at 50% 50%); }
        50%  { clip-path: ellipse(72% 60% at 50% 50%); }
        75%  { clip-path: ellipse(72% 36% at 50% 50%); }
        100% { clip-path: ellipse(70% 4% at 50% 50%); }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash-stage" aria-label="b4-loader">
        <div class="boot-splash-logo" role="img" aria-label="شعار عيون الشروق"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
